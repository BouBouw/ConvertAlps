name: Release

# Déclenché sur push d'un tag de version : v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    permissions:
      contents: write   # Nécessaire pour créer la GitHub Release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # ── 3. Rust stable ─────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './app/src-tauri -> target'

      # ── 4. Dépendances frontend ────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install
        working-directory: app

      # ── 5. Sidecar Express (production) ───────────────────────────────────
      # Le binaire doit être dans src-tauri/binaries/ avant le build Tauri
      - name: Install backend dependencies
        run: npm install
        working-directory: app/backend-express

      - name: Build backend sidecar
        run: npm run pkg:win
        working-directory: app/backend-express

      # ── 6. Build Tauri + GitHub Release ───────────────────────────────────
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                      ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:         ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'ConvertAlps ${{ github.ref_name }}'
          releaseBody: |
            ## Nouveautés

            Voir le [journal des modifications](https://github.com/BouBouw/ConvertAlps/blob/main/CHANGELOG.md) pour les détails.

            ---
            **Installation** : téléchargez `ConvertAlps_*_x64-setup.exe` ci-dessous.  
            **Mise à jour automatique** : si l'application est déjà installée, elle se met à jour toute seule au prochain démarrage.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
